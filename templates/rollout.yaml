apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: bootcamp-api
  namespace: bootcamp
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: bootcamp-api
  strategy:
    canary:
      canaryService: bootcamp-api-canary
      stableService: bootcamp-api
      trafficRouting:
        alb:
          ingress: bootcamp-api
          servicePort: 80
          rootService: bootcamp-api
      steps:
        - setWeight: 10
        - pause: { duration: 2m }
        - analysis:
            templates:
              - templateName: bootcamp-api-canary-health
        - setWeight: 25
        - pause: { duration: 2m }
        - analysis:
            templates:
              - templateName: bootcamp-api-canary-health
        - setWeight: 50
        - pause: { duration: 5m }
        - analysis:
            templates:
              - templateName: bootcamp-api-canary-health
        - setWeight: 75
        - pause: { duration: 2m }
        - setWeight: 100
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bootcamp-api
    spec:
      containers:
        - name: bootcamp-api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            httpGet: { path: /health, port: http }
            periodSeconds: 5
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 500m, memory: 512Mi }
