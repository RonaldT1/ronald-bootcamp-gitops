{{- if .Values.metrics.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ .Release.Name }}
  labels:
    release: kps
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: bootcamp-api
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
{{- end }}
